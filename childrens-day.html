<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六一儿童节 · 星空许愿瓶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
    background: #0a0a2e;
  }

  /* ===== 夜空画布 ===== */
  canvas#sky {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ===== UI 层 ===== */
  .ui-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }

  /* ===== 标题 ===== */
  .title {
    position: absolute;
    top: 30px;
    width: 100%;
    text-align: center;
    pointer-events: none;
  }
  .title h1 {
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    background: linear-gradient(135deg, #f9d423, #ff4e50, #ee5a6f, #f9d423);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleShine 3s ease-in-out infinite;
    text-shadow: none;
    letter-spacing: 0.08em;
  }
  @keyframes titleShine {
    0%, 100% { background-position: 0% 50%; filter: brightness(1); }
    50%      { background-position: 100% 50%; filter: brightness(1.3); }
  }
  .title .sub {
    font-size: clamp(14px, 2vw, 18px);
    color: rgba(255,255,255,0.65);
    margin-top: 4px;
    letter-spacing: 0.15em;
  }

  /* ===== 许愿面板 ===== */
  .wish-panel {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 24px;
    pointer-events: auto;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .wish-panel:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 8px 40px rgba(100, 100, 255, 0.15);
  }
  .wish-panel h3 {
    color: rgba(255,255,255,0.9);
    font-size: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .wish-panel h3 .icon { font-size: 22px; }
  .wish-panel textarea {
    width: 100%;
    height: 80px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #fff;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: all 0.3s;
  }
  .wish-panel textarea:focus {
    border-color: rgba(255,200,100,0.5);
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 20px rgba(255,180,50,0.1);
  }
  .wish-panel textarea::placeholder {
    color: rgba(255,255,255,0.3);
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.3s;
    font-family: inherit;
  }
  .btn-send {
    background: linear-gradient(135deg, #f9d423, #ff6b6b);
    color: #1a1a2e;
  }
  .btn-send:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(249,212,35,0.35);
  }
  .btn-send:active {
    transform: scale(0.95);
  }
  .btn-clear {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
  .btn-clear:hover {
    background: rgba(255,255,255,0.18);
  }

  /* ===== 愿望列表 ===== */
  .wish-list {
    margin-top: 14px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .wish-list::-webkit-scrollbar { width: 4px; }
  .wish-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
  }
  .wish-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    animation: fadeSlide 0.5s ease-out;
    transition: all 0.3s;
  }
  .wish-item:hover {
    background: rgba(255,255,255,0.1);
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .wish-star {
    font-size: 16px;
    flex-shrink: 0;
  }
  .wish-time {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* ===== 底部提示 ===== */
  .hint-bar {
    position: absolute;
    bottom: 24px;
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    letter-spacing: 0.1em;
    pointer-events: none;
  }
  .hint-bar span {
    animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }

  /* ===== 统计徽章 ===== */
  .stats {
    position: absolute;
    left: 20px;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .stat-badge {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 30px;
    padding: 8px 18px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    letter-spacing: 0.05em;
    transition: all 0.5s;
  }
  .stat-badge .num {
    font-weight: 700;
    font-size: 22px;
    background: linear-gradient(135deg, #f9d423, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== 响应式适配 ===== */
  @media (max-width: 700px) {
    .wish-panel {
      right: 50%;
      top: auto;
      bottom: 100px;
      transform: translateX(50%);
      width: calc(100vw - 40px);
      max-width: 340px;
    }
    .stats {
      left: 10px;
      bottom: auto;
      top: 120px;
      flex-direction: row;
      gap: 6px;
    }
    .stat-badge {
      padding: 6px 12px;
      font-size: 11px;
    }
    .stat-badge .num { font-size: 17px; }
  }
</style>
</head>
<body>

<!-- 夜空画布 -->
<canvas id="sky"></canvas>

<!-- UI 层 -->
<div class="ui-layer">
  <!-- 标题 -->
  <div class="title">
    <h1>🌠 六 一 快 乐 🌠</h1>
    <div class="sub">愿每个大人心里，都住着一个小孩</div>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-badge">✨ 星星 <span class="num" id="starCount">0</span></div>
    <div class="stat-badge">💝 愿望 <span class="num" id="wishCount">0</span></div>
  </div>

  <!-- 许愿面板 -->
  <div class="wish-panel" id="wishPanel">
    <h3><span class="icon">💫</span> 许下一个愿望</h3>
    <textarea id="wishInput" placeholder="写下你的童年愿望…&#10;比如：想再吃一次校门口的糖葫芦" maxlength="80"></textarea>
    <div class="btn-row">
      <button class="btn btn-send" onclick="makeWish()">🌟 放飞愿望</button>
      <button class="btn btn-clear" onclick="clearWish()">清空</button>
    </div>
    <div class="wish-list" id="wishList"></div>
  </div>

  <!-- 底部提示 -->
  <div class="hint-bar">
    <span>✨ 点击夜空的任意位置，放一颗属于你的星星 ✨</span>
  </div>
</div>

<script>
// ======================== 主程序 ========================
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

let W, H;
let stars = [];           // 背景星星
let userStars = [];       // 用户点击的星星
let shootingStars = [];   // 流星
let particles = [];       // 飘浮光点
let wishes = [];          // 愿望列表
let mouse = { x: -100, y: -100 };
let mouseTrail = [];

// ===== 调整画布大小 =====
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ===== 背景星星 =====
function createBgStars() {
  stars = [];
  const count = Math.floor((W * H) / 1800);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.4,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      baseAlpha: Math.random() * 0.5 + 0.4,
      hue: 40 + Math.random() * 30, // 暖金色调
    });
  }
}
resize();
createBgStars();
window.addEventListener('resize', createBgStars);

// ===== 工具函数 =====
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ===== 用户星星颜色 =====
const starColors = [
  '#fff7cc', // 暖白
  '#ffe0a3', // 暖金
  '#ffb3ba', // 粉红
  '#bae1ff', // 淡蓝
  '#baffc9', // 淡绿
  '#e8baff', // 淡紫
  '#ffdfba', // 杏色
  '#baf2ff', // 天蓝
];

// ===== 用户点击：创建星星和粒子爆发 =====
canvas.addEventListener('click', (e) => {
  const x = e.clientX;
  const y = e.clientY;
  const color = starColors[Math.floor(Math.random() * starColors.length)];

  // 添加用户星星
  userStars.push({
    x, y,
    r: Math.random() * 5 + 8,          // 初始半径
    targetR: Math.random() * 4 + 5,     // 稳定后的半径
    color,
    alpha: 0,
    targetAlpha: 0.9,
    pulseOffset: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.03 + 0.015,
    createdAt: performance.now(),
    rotation: Math.random() * Math.PI * 2,
  });

  // 粒子爆发
  const particleCount = Math.floor(Math.random() * 12) + 10;
  for (let i = 0; i < particleCount; i++) {
    const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.4;
    const speed = Math.random() * 3 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.02 + 0.012,
      r: Math.random() * 2.5 + 1,
      color,
    });
  }

  // 更新计数
  document.getElementById('starCount').textContent = userStars.length;
});

// ===== 鼠标追踪光晕 =====
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouseTrail.push({ x: mouse.x, y: mouse.y, life: 1 });
  if (mouseTrail.length > 30) mouseTrail.shift();
});

// ===== 许愿功能 =====
function makeWish() {
  const input = document.getElementById('wishInput');
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' +
                  now.getMinutes().toString().padStart(2,'0');

  wishes.push({ text, time: timeStr, id: Date.now() });
  input.value = '';
  renderWishes();

  // 在画面中央偏上方发射一波星星庆祝
  const cx = W * (0.3 + Math.random() * 0.4);
  const cy = H * (0.3 + Math.random() * 0.2);
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 3;
    const color = starColors[Math.floor(Math.random() * starColors.length)];
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: Math.random() * 0.015 + 0.008,
      r: Math.random() * 3 + 1.5,
      color,
    });
  }

  // 添加一颗大星星
  userStars.push({
    x: cx, y: cy,
    r: 0,
    targetR: Math.random() * 6 + 14,
    color: '#fff7cc',
    alpha: 0,
    targetAlpha: 1,
    pulseOffset: Math.random() * Math.PI * 2,
    pulseSpeed: 0.02,
    createdAt: performance.now(),
    rotation: Math.random() * Math.PI * 2,
  });

  document.getElementById('starCount').textContent = userStars.length;
  document.getElementById('wishCount').textContent = wishes.length;
}

function clearWish() {
  document.getElementById('wishInput').value = '';
}

function renderWishes() {
  const list = document.getElementById('wishList');
  list.innerHTML = wishes.slice().reverse().map(w => `
    <div class="wish-item">
      <span class="wish-star">🌟</span>
      <span>${escapeHtml(w.text)}</span>
      <span class="wish-time">${w.time}</span>
    </div>
  `).join('');
  document.getElementById('wishCount').textContent = wishes.length;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 回车发送愿望
document.getElementById('wishInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    makeWish();
  }
});

// ===== 流星生成 =====
function spawnShootingStar() {
  const x = Math.random() * W;
  const y = Math.random() * H * 0.5;
  const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.5; // 右下方向
  const speed = Math.random() * 8 + 10;
  const length = Math.random() * 80 + 60;
  shootingStars.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 1,
    decay: Math.random() * 0.01 + 0.006,
    length,
    alpha: Math.random() * 0.5 + 0.5,
  });
}
// 随机生成流星
setInterval(() => {
  if (Math.random() < 0.3) spawnShootingStar();
}, 3000);
spawnShootingStar(); // 初始一颗

// ===== 绘制函数 =====
function drawBgStar(s) {
  const alpha = s.baseAlpha + Math.sin(performance.now() * s.twinkleSpeed + s.twinkleOffset) * 0.3;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${s.hue}, 80%, 80%, ${Math.max(0.1, alpha)})`;
  ctx.fill();
}

function drawStarShape(x, y, r, rotation, color, alpha) {
  const spikes = 5;
  const outerR = r;
  const innerR = r * 0.4;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const radius = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI * 2 * i) / (spikes * 2) - Math.PI / 2;
    const px = Math.cos(angle) * radius;
    const py = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
  // 处理 hex 颜色
  const rgb = hexToRgb(color);
  ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;

  // 发光效果
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = r * 1.5;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawGlowCircle(x, y, r, color, alpha) {
  const rgb = hexToRgb(color);
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`);
  grad.addColorStop(0.4, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * 0.4})`);
  grad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ===== 主动画循环 =====
let lastTime = performance.now();

function animate(now) {
  const dt = Math.min((now - lastTime) / 16.67, 3); // 归一化到 60fps
  lastTime = now;

  // 清屏
  ctx.clearRect(0, 0, W, H);

  // 绘制夜空底色
  const skyGrad = ctx.createRadialGradient(W/2, H*0.3, H*0.1, W/2, H*0.5, Math.max(W, H));
  skyGrad.addColorStop(0, '#1a1a4e');
  skyGrad.addColorStop(1, '#0a0a1e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // 绘制极光效果
  const auroraGrad = ctx.createRadialGradient(W*0.7, H*0.3, 0, W*0.7, H*0.3, W*0.6);
  auroraGrad.addColorStop(0, 'rgba(80, 60, 180, 0.04)');
  auroraGrad.addColorStop(0.5, 'rgba(40, 80, 160, 0.02)');
  auroraGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = auroraGrad;
  ctx.fillRect(0, 0, W, H);

  // 绘制背景星星
  for (const s of stars) drawBgStar(s);

  // 绘制鼠标光晕
  if (mouseTrail.length > 1) {
    for (let i = 1; i < mouseTrail.length; i++) {
      const p = mouseTrail[i];
      p.life -= 0.03;
      if (p.life <= 0) continue;
      const alpha = p.life * 0.25;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 180, 255, ${alpha})`;
      ctx.fill();
    }
    mouseTrail = mouseTrail.filter(p => p.life > 0);
  }

  // 绘制流星
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.life -= s.decay * dt;

    if (s.life <= 0 || s.x > W + 100 || s.y > H + 100) {
      shootingStars.splice(i, 1);
      continue;
    }

    const endX = s.x - Math.cos(Math.atan2(s.vy, s.vx)) * s.length * s.life;
    const endY = s.y - Math.sin(Math.atan2(s.vy, s.vx)) * s.length * s.life;

    const grad = ctx.createLinearGradient(s.x, s.y, endX, endY);
    grad.addColorStop(0, `rgba(255,255,255,${s.alpha * s.life})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5 * s.life;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // 绘制用户星星
  for (const s of userStars) {
    // 入场动画
    const age = (now - s.createdAt) / 1000;
    const animProgress = Math.min(age / 0.6, 1);
    const ease = 1 - Math.pow(1 - animProgress, 3); // easeOutCubic

    s.alpha = lerp(s.alpha, s.targetAlpha, 0.05 * dt);
    s.r = lerp(s.r, s.targetR + Math.sin(now * s.pulseSpeed + s.pulseOffset) * 2, 0.06 * dt);
    s.rotation += 0.002 * dt;

    const currentAlpha = s.alpha * ease;
    const currentR = s.r * ease;

    // 外层光晕
    drawGlowCircle(s.x, s.y, currentR * 3, s.color, currentAlpha * 0.3);
    drawGlowCircle(s.x, s.y, currentR * 1.8, s.color, currentAlpha * 0.5);

    // 五角星
    drawStarShape(s.x, s.y, currentR, s.rotation, s.color, currentAlpha);

    // 中心亮点
    ctx.beginPath();
    ctx.arc(s.x, s.y, currentR * 0.25, 0, Math.PI * 2);
    const rgb = hexToRgb(s.color);
    ctx.fillStyle = `rgba(255,255,255,${currentAlpha * 0.8})`;
    ctx.shadowColor = 'white';
    ctx.shadowBlur = currentR * 0.8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 绘制粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay * dt;
    p.vy += 0.02 * dt; // 微重力

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    const rgb = hexToRgb(p.color);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${p.life})`;
    ctx.shadowColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${p.life})`;
    ctx.shadowBlur = p.r * 2;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 清理过旧的用户星星（超过300颗时移除最早的）
  while (userStars.length > 300) {
    userStars.shift();
  }

  requestAnimationFrame(animate);
}
