<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陈伟泽 💬</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #111; display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
}
.phone {
  width: 420px; max-width: 100vw; height: 100vh; max-height: 860px;
  background: #ededed; display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden;
}
.header {
  background: #1a1a1a; color: #fff; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.header .back { font-size: 22px; color: #fff; background: none; border: none; cursor: pointer; }
.header .avatar {
  width: 36px; height: 36px; border-radius: 6px;
  background: linear-gradient(135deg, #4a90d9, #357abd);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: bold; color: #fff; flex-shrink: 0;
}
.header .info { flex: 1; }
.header .name { font-size: 16px; font-weight: 500; }
.header .status { font-size: 11px; color: #aaa; }
.header .menu { font-size: 20px; background: none; border: none; color: #fff; cursor: pointer; }
.messages {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  background: #ededed; display: flex; flex-direction: column; gap: 1px;
}
.time-divider {
  text-align: center; margin: 12px 0 8px;
  font-size: 11px; color: #b0b0b0;
}
.time-divider span {
  background: #d5d5d5; padding: 3px 8px; border-radius: 3px;
}
.msg-row { display: flex; margin: 2px 0; align-items: flex-start; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.me { flex-direction: row-reverse; }
.msg-row.he .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: linear-gradient(135deg, #4a90d9, #357abd);
}
.msg-row.me .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: #95ec69;
}
.bubble {
  padding: 9px 13px; border-radius: 6px;
  font-size: 15px; line-height: 1.5; word-break: break-word;
  max-width: 65%; position: relative;
}
.msg-row.me .bubble { background: #95ec69; color: #000; border-top-right-radius: 2px; }
.msg-row.he .bubble { background: #fff; color: #000; border-top-left-radius: 2px; }
.bubble-wrap { display: flex; flex-direction: column; max-width: 65%; }
.msg-row.me .bubble-wrap { align-items: flex-end; }
.msg-row.he .bubble-wrap { align-items: flex-start; }
.typing { display: none; padding: 4px 14px; }
.typing.active { display: flex; align-items: center; gap: 12px; }
.typing .dots { display: flex; gap: 4px; padding: 8px 14px; background: #fff; border-radius: 6px; }
.typing .dots span {
  width: 7px; height: 7px; border-radius: 50%; background: #ccc;
  animation: bounce 1.4s infinite ease-in-out both;
}
.typing .dots span:nth-child(1) { animation-delay: -0.32s; }
.typing .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
.input-bar {
  background: #f7f7f7; padding: 8px 10px;
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid #e0e0e0; flex-shrink: 0;
}
.input-bar input {
  flex: 1; padding: 10px 14px; border-radius: 20px;
  border: 1px solid #ddd; font-size: 15px; outline: none;
  background: #fff;
}
.input-bar input:focus { border-color: #07c160; }
.input-bar .send-btn {
  padding: 9px 18px; background: #07c160; color: #fff;
  border: none; border-radius: 20px; font-size: 14px; cursor: pointer;
  flex-shrink: 0;
}
.input-bar .send-btn:active { background: #06ad56; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <button class="back">←</button>
    <div class="avatar">泽</div>
    <div class="info">
      <div class="name">陈伟泽</div>
      <div class="status">广航大一 · 在线</div>
    </div>
    <button class="menu">⋯</button>
  </div>

  <div class="messages" id="messages">
    <div class="time-divider"><span>2026-06-13</span></div>
  </div>

  <div class="typing" id="typing">
    <div class="avatar-small" style="background:linear-gradient(135deg, #4a90d9, #357abd);">泽</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="跟陈伟泽聊天..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()" autofocus>
    <button class="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
const msgsDiv = document.getElementById('messages');
const typingDiv = document.getElementById('typing');
const input = document.getElementById('msgInput');

function addBubble(text, isMe) {
  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'he'}`;

  const ava = document.createElement('div');
  ava.className = 'avatar-small';
  ava.textContent = isMe ? '我' : '泽';

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(bubble);
  row.appendChild(ava);
  row.appendChild(wrap);
  msgsDiv.appendChild(row);
  msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  addBubble(text, true);
  input.value = '';
  typingDiv.classList.add('active');
  msgsDiv.scrollTop = msgsDiv.scrollHeight;

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await resp.json();

    // Natural typing delay based on message length
    const delay = data.reply.length > 20 ? 1200 : data.reply.length > 10 ? 600 : 300;
    await new Promise(r => setTimeout(r, delay));

    typingDiv.classList.remove('active');
    addBubble(data.reply, false);
  } catch (e) {
    typingDiv.classList.remove('active');
    addBubble('...', false);
  }
}

input.focus();
</script>
</body>
</html>
