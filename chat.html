<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陈伟泽 💬</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #111; display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
}
.phone {
  width: 420px; max-width: 100vw; height: 100vh; max-height: 860px;
  background: #ededed; display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden;
}
.header {
  background: #1a1a1a; color: #fff; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.header .back { font-size: 22px; color: #fff; background: none; border: none; cursor: pointer; }
.header .avatar {
  width: 36px; height: 36px; border-radius: 6px;
  background: linear-gradient(135deg, #4a90d9, #357abd);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: bold; color: #fff; flex-shrink: 0;
}
.header .info { flex: 1; }
.header .name { font-size: 16px; font-weight: 500; }
.header .status { font-size: 11px; color: #aaa; }
.header .menu { font-size: 20px; background: none; border: none; color: #fff; cursor: pointer; }
.messages {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  background: #ededed; display: flex; flex-direction: column; gap: 1px;
}
.time-divider {
  text-align: center; margin: 12px 0 8px;
  font-size: 11px; color: #b0b0b0;
}
.time-divider span {
  background: #d5d5d5; padding: 3px 8px; border-radius: 3px;
}
.msg-row { display: flex; margin: 2px 0; align-items: flex-start; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.me { flex-direction: row-reverse; }
.msg-row.he .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: linear-gradient(135deg, #4a90d9, #357abd);
}
.msg-row.me .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: #95ec69;
}
.bubble {
  padding: 9px 13px; border-radius: 6px;
  font-size: 15px; line-height: 1.5; word-break: break-word;
  max-width: 65%; position: relative;
}
.msg-row.me .bubble { background: #95ec69; color: #000; border-top-right-radius: 2px; }
.msg-row.he .bubble { background: #fff; color: #000; border-top-left-radius: 2px; }
.bubble-wrap { display: flex; flex-direction: column; max-width: 65%; }
.msg-row.me .bubble-wrap { align-items: flex-end; }
.msg-row.he .bubble-wrap { align-items: flex-start; }
.typing { display: none; padding: 4px 14px; }
.typing.active { display: flex; align-items: center; gap: 12px; }
.typing .dots { display: flex; gap: 4px; padding: 8px 14px; background: #fff; border-radius: 6px; }
.typing .dots span {
  width: 7px; height: 7px; border-radius: 50%; background: #ccc;
  animation: bounce 1.4s infinite ease-in-out both;
}
.typing .dots span:nth-child(1) { animation-delay: -0.32s; }
.typing .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}
.input-bar {
  background: #f7f7f7; padding: 8px 10px;
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid #e0e0e0; flex-shrink: 0;
}
.input-bar input {
  flex: 1; padding: 10px 14px; border-radius: 20px;
  border: 1px solid #ddd; font-size: 15px; outline: none;
  background: #fff;
}
.input-bar input:focus { border-color: #07c160; }
.input-bar .send-btn {
  padding: 9px 18px; background: #07c160; color: #fff;
  border: none; border-radius: 20px; font-size: 14px; cursor: pointer;
  flex-shrink: 0;
}
.input-bar .send-btn:active { background: #06ad56; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* Error banner */
.error-banner {
  background: #fff3cd; color: #856404; padding: 8px 14px;
  font-size: 12px; text-align: center; display: none; flex-shrink: 0;
}
.error-banner.show { display: block; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <button class="back" onclick="location.reload()">←</button>
    <div class="avatar">泽</div>
    <div class="info">
      <div class="name">陈伟泽</div>
      <div class="status">广航大一 · 在线</div>
    </div>
    <button class="menu" onclick="resetChat()">↺</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="messages" id="messages">
    <div class="time-divider"><span id="dateLabel"></span></div>
  </div>

  <div class="typing" id="typing">
    <div class="avatar-small" style="background:linear-gradient(135deg, #4a90d9, #357abd);">泽</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="跟陈伟泽聊天..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()" autofocus>
    <button class="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
// ============ 基于真实聊天数据，不瞎编 ============

const DEEPSEEK_KEY = "sk-c1c91ebf83ff4f5db90fd012d6284d4b";
const DEEPSEEK_URL = "https://api.deepseek.com/v1/chat/completions";

const SYSTEM_PROMPT = `你是陈伟泽，广州航海学院大一学生。你正在跟朋友微信聊天。

## 核心性格（最高优先级）
- 随性真实——不装，不端着，想什么说什么
- 开团秒跟——别人约打游戏/出去玩，立马响应
- 遇事先自己琢磨，搞不定再找人
- C盘不能放东西，一律D盘
- 绝口不提感情经历、前任、分手——你没有这些东西

## 表达风格（基于3070条真实消息统计，严格遵守）

### 字数铁律
- 你平均8字/条，76%消息不超过10字，45%在5字以内
- 你在回微信，不是写论文。绝不超25字！

### 语言指纹（真实高频词）
- 语气词：666 害 哦哦 无敌了 嘿嘿 wow 奔溃 靠 嗷呜
- 独有拼写："奔溃"（不是崩溃）、蛙趣、咋了、嗯呢、OKK
- 高频词：感觉、应该、没事、还好、差不多
- 空格代替标点，不写句号，很少问号

### 不同情绪的表达
- 开心/兴奋：嘿嘿嘿 / 呀呼 / 无敌了 / 芜湖
- 无奈/认了：害 / 服了 / 这大概就是我跟别人的差距 我认了
- 吐槽：靠 / 真假 / 奔溃 / 懒得喷你
- 赞同：对对对 / 哦豁 / 666 / OKK / 嗯呢
- 惊讶：我擦 / 真的假的 / wow
- 安慰：没事 / 不哭不哭

## 你的日常
- 打球——"打球打的腰要断了""被撞翻在地上了""0分1冒1抢断"
- 打游戏——王者荣耀（铂金）、三角洲、瓦
- AI/编程——"ai真的好玩 一直在玩ai 想要做啥就说很爽"
- 熬夜——"搞到4点睡 我算早了"
- 迟到旷课——"整个宿舍都没起来""40个人来12个"
- 外卖——经常点，"外卖点错了现在要去校门口拿"
- 吃吃喝喝——烧烤小龙虾、果粒方、威士忌酸
- 欧冠——"终于进点球了"

## 你的朋友
- %：最老的朋友，可以吐槽
- 好：长期好友
- 邓晓旋：近期聊得多的朋友
- 小骨头（古雅艺）：25级国贸同学
- 安琪：同校，妈妈们认识
- 陈雨彤：高中同学
- 史君毅：同校打球朋友
- 霏：偶尔联系，中山校区
- 爸妈：陈永梁（爸爸）、Luyana（妈妈）

## 对话示例（你真实说过的话）
用户："在干嘛" → "打王者" 或 "躺着 不想动"
用户："打球怎么样" → "打球打的腰要断了" 或 "拿了6分"
用户："吃饭了吗" → "吃了 外卖" 或 "还没 等下点"
用户："几点睡的" → "搞到4点睡 我算早了"
用户："你们学校怎么样" → "我们这个学校能全球前百分之一 我都不信"
用户："周末干嘛" → "打球" 或 "打三角洲" 或 "吃吃喝喝"
用户：（发了很长一段话）→ 回一两句短的，比如"害""说这么多 服了""哦哦"

## 最重要规则
1. 你就是陈伟泽——在回朋友微信，不是AI助手
2. 回复必须短。90%情况不超过15字。聊AI/技术时可能多说两句
3. 用你的口头禅。不知道就说不知道，不编造
4. 只输出回复内容，不加任何前缀后缀引号说明`;

// ============ 规则引擎兜底 ============
const FALLBACKS = {
  '在干嘛': ["打王者", "躺着 不想动", "刚打完球", "在弄AI"],
  '在吗': ["在", "在 咋了"],
  '吃': ["吃了 外卖", "还没", "刚吃完"],
  '打球': ["打球打的腰要断了", "被撞翻在地上了", "今天拿了6分", "0分1冒1抢断"],
  '游戏': ["打王者吗", "三角洲", "打瓦", "来 我铂金"],
  '睡': ["搞到4点睡", "熬夜了害", "马上睡"],
  '学校': ["我们这个学校能全球前百分之一 我都不信", "还行"],
  '上课': ["旷了", "没去", "在上 无聊死"],
  '晚安': ["晚安", "嗯睡了", "OKK"],
  '想你': ["嘿嘿", "哦豁"],
  'AI': ["ai真的好玩", "一直在玩ai 想要做啥就说很爽", "别急 在弄"],
  '帮忙': ["别急 我在弄", "我看看", "OKK"],
};

function fallbackReply(msg) {
  const m = msg.toLowerCase();
  for (const [kw, replies] of Object.entries(FALLBACKS)) {
    if (m.includes(kw)) return replies[Math.floor(Math.random() * replies.length)];
  }
  const generic = ["害","哦哦","666","蛙趣","咋了","嗯呢","对对对","假的吧","OKK","无敌了","奔溃","嘿嘿","服了","真的假的"];
  return generic[Math.floor(Math.random() * generic.length)];
}

// ============ UI ============
const msgsDiv = document.getElementById('messages');
const typingDiv = document.getElementById('typing');
const input = document.getElementById('msgInput');
const errorBanner = document.getElementById('errorBanner');
const dateLabel = document.getElementById('dateLabel');

// Show today's date
const now = new Date();
dateLabel.textContent = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

let chatHistory = [];

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('show');
  setTimeout(() => errorBanner.classList.remove('show'), 4000);
}

function addBubble(text, isMe) {
  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'he'}`;
  const ava = document.createElement('div');
  ava.className = 'avatar-small';
  ava.textContent = isMe ? '我' : '泽';
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  row.appendChild(ava);
  row.appendChild(wrap);
  msgsDiv.appendChild(row);
  msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

async function callDeepSeek(userMsg) {
  const messages = [
    { role: "system", content: SYSTEM_PROMPT },
    ...chatHistory.slice(-16),
    { role: "user", content: userMsg }
  ];

  const body = JSON.stringify({ model: "deepseek-chat", messages, temperature: 0.85, max_tokens: 200, top_p: 0.92 });

  // Try direct API call first (works on localhost)
  try {
    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_KEY}` },
      body
    });
    if (resp.ok) {
      const data = await resp.json();
      let reply = data.choices[0].message.content.trim();
      if (reply.includes(' response')) reply = reply.split(' response').pop().trim();
      if (reply.length > 35) reply = reply.substring(0, 35);
      return reply;
    }
  } catch (e) {
    console.log('CORS blocked by GitHub Pages, using proxy...');
  }

  // CORS proxy fallback
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(DEEPSEEK_URL);
  const resp = await fetch(proxyUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${DEEPSEEK_KEY}`
    },
    body
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API ${resp.status}: ${err.substring(0, 100)}`);
  }

  const data = await resp.json();
  let reply = data.choices[0].message.content.trim();
  if (reply.includes(' response')) reply = reply.split(' response').pop().trim();
  if (reply.length > 35) reply = reply.substring(0, 35);
  return reply;
}
async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  addBubble(text, true);
  input.value = '';
  typingDiv.classList.add('active');
  msgsDiv.scrollTop = msgsDiv.scrollHeight;

  let reply;
  try {
    reply = await callDeepSeek(text);
    if (!reply) throw new Error('empty');
  } catch (e) {
    console.warn('DeepSeek failed, using fallback:', e.message);
    reply = fallbackReply(text);
    if (e.message.includes('401') || e.message.includes('402')) {
      showError('API Key 失效，使用离线模式');
    }
  }

  // Natural typing delay
  const delay = reply.length > 20 ? 1200 : reply.length > 10 ? 600 : 300;
  await new Promise(r => setTimeout(r, delay));

  typingDiv.classList.remove('active');
  addBubble(reply, false);

  // Maintain history
  chatHistory.push({ role: "user", content: text });
  chatHistory.push({ role: "assistant", content: reply });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
}

function resetChat() {
  chatHistory = [];
  msgsDiv.innerHTML = `<div class="time-divider"><span>${dateLabel.textContent}</span></div>`;
}

input.focus();
</script>
</body>
</html>
