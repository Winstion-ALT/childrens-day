<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陈伟泽 💬</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #111; display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
}
.phone {
  width: 420px; max-width: 100vw; height: 100vh; max-height: 860px;
  background: #ededed; display: flex; flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden;
}
.header {
  background: #1a1a1a; color: #fff; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.header .back { font-size: 22px; color: #fff; background: none; border: none; cursor: pointer; }
.header .avatar {
  width: 36px; height: 36px; border-radius: 6px;
  background: linear-gradient(135deg, #4a90d9, #357abd);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: bold; color: #fff; flex-shrink: 0;
}
.header .info { flex: 1; }
.header .name { font-size: 16px; font-weight: 500; }
.header .status { font-size: 11px; color: #aaa; }
.header .menu { font-size: 20px; background: none; border: none; color: #fff; cursor: pointer; }
.messages {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  background: #ededed; display: flex; flex-direction: column; gap: 1px;
}
.time-divider { text-align: center; margin: 12px 0 8px; font-size: 11px; color: #b0b0b0; }
.time-divider span { background: #d5d5d5; padding: 3px 8px; border-radius: 3px; }
.msg-row { display: flex; margin: 2px 0; align-items: flex-start; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.me { flex-direction: row-reverse; }
.msg-row.he .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: linear-gradient(135deg, #4a90d9, #357abd);
}
.msg-row.me .avatar-small {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0; margin: 0 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff; background: #95ec69;
}
.bubble { padding: 9px 13px; border-radius: 6px; font-size: 15px; line-height: 1.5; word-break: break-word; max-width: 65%; }
.msg-row.me .bubble { background: #95ec69; color: #000; border-top-right-radius: 2px; }
.msg-row.he .bubble { background: #fff; color: #000; border-top-left-radius: 2px; }
.bubble-wrap { display: flex; flex-direction: column; max-width: 65%; }
.msg-row.me .bubble-wrap { align-items: flex-end; }
.msg-row.he .bubble-wrap { align-items: flex-start; }
.typing { display: none; padding: 4px 14px; }
.typing.active { display: flex; align-items: center; gap: 12px; }
.typing .dots { display: flex; gap: 4px; padding: 8px 14px; background: #fff; border-radius: 6px; }
.typing .dots span { width: 7px; height: 7px; border-radius: 50%; background: #ccc; animation: bounce 1.4s infinite ease-in-out both; }
.typing .dots span:nth-child(1) { animation-delay: -0.32s; }
.typing .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
.input-bar {
  background: #f7f7f7; padding: 8px 10px; display: flex; align-items: center; gap: 8px;
  border-top: 1px solid #e0e0e0; flex-shrink: 0;
}
.input-bar input {
  flex: 1; padding: 10px 14px; border-radius: 20px;
  border: 1px solid #ddd; font-size: 15px; outline: none; background: #fff;
}
.input-bar input:focus { border-color: #07c160; }
.input-bar .send-btn {
  padding: 9px 18px; background: #07c160; color: #fff;
  border: none; border-radius: 20px; font-size: 14px; cursor: pointer; flex-shrink: 0;
}
.input-bar .send-btn:active { background: #06ad56; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
.tag { display:inline-block;background:#07c160;color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle;}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <button class="back" onclick="location.reload()">←</button>
    <div class="avatar">泽</div>
    <div class="info"><div class="name">陈伟泽<span class="tag">离线</span></div><div class="status">广航大一 · 规则引擎 零token</div></div>
    <button class="menu" onclick="resetChat()">↺</button>
  </div>
  <div class="messages" id="messages"><div class="time-divider"><span id="dateLabel"></span></div></div>
  <div class="typing" id="typing">
    <div class="avatar-small" style="background:linear-gradient(135deg, #4a90d9, #357abd);">泽</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="跟陈伟泽聊天..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()" autofocus>
    <button class="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
// ============ 纯规则引擎 · 零API · 零token ============
// 全部回复基于陈伟泽真实聊天记录

const RULES = [
  // ---- 问候 ----
  { kw:['在干嘛','干嘛呢','干啥呢','在做什么','在弄啥'], r:['打王者','躺着 不想动','刚打完球','在弄AI','写代码呢'] },
  { kw:['在吗','在不在','在不','在没'], r:['在','在 咋了','嗯在'] },
  { kw:['早','早安','早上好','早啊'], r:['早','早啊 困死'] },
  { kw:['晚安','睡了','睡了没','睡了吗','早点睡'], r:['晚安','嗯睡了','OKK 睡了','马上睡 你先'] },
  { kw:['拜拜','再见','88','bye'], r:['拜','嗯拜拜','下次聊'] },

  // ---- 吃 ----
  { kw:['吃了吗','吃了没','吃饭','吃了啥','午饭','晚饭','早餐','午饭吃','晚饭吃','早餐吃'], r:['吃了 外卖','还没 等下点','刚吃完','吃了 还行'] },
  { kw:['好吃','好喝','馋','味道'], r:['确实','还行','哇 馋了'] },
  { kw:['外卖','点外卖'], r:['外卖点错了 要去校门口拿','随便点了个','今天不点外卖了'] },
  { kw:['小龙虾','烧烤','火锅','奶茶','甜品','水果','零食','果粒方','威士忌'], r:['哇 我全在吃吃喝喝','想吃','没钱了害'] },

  // ---- 打球 ----
  { kw:['打球','篮球','打球吗','打球不','打球去','球场'], r:['走啊 等我打完这把','打球打的腰要断了','被撞翻在地上了','今天拿了6分','0分1冒1抢断'] },
  { kw:['乒乓球','足球'], r:['可以 约一个','好久没踢了'] },

  // ---- 游戏 ----
  { kw:['王者','王者荣耀','开黑','排位','铂金'], r:['来 我铂金','打王者吗','等我开一把'] },
  { kw:['三角洲','三角洲吗'], r:['三角洲 来','晚上玩三角洲吗 or王者','走走走'] },
  { kw:['瓦','瓦罗','valorant','打瓦'], r:['打瓦','瓦 可以','搞起'] },
  { kw:['游戏','打游戏','开游戏','玩什么'], r:['王者三角洲瓦 随便','看你 我都行','三角洲'] },

  // ---- 学校 ----
  { kw:['学校','广航','你们学校','这学校'], r:['我们这个学校能全球前百分之一 我都不信','还行吧','凑合'] },
  { kw:['上课','上课吗','上课没','有课'], r:['上了','旷了','没去','在上 无聊死','40个人来12个'] },
  { kw:['迟到','旷课','逃课'], r:['又被抓了 没事 不旷第三次就行','整个宿舍都没起来','全部迟到'] },
  { kw:['签到','点名'], r:['帮我签到','又被点了','拿名单了我就回来了'] },
  { kw:['考试','期末','四级','英语'], r:['150分卷考70 奔溃','我已经为四级禁音了','害 别提'] },
  { kw:['宿舍','舍友'], r:['他们一般中午才起床','我肯定要背着我舍友','舍友闹钟7.30就响'] },
  { kw:['校园跑','跑步'], r:['出去跑个校园跑叮了三个包','还没跑','不想跑'] },

  // ---- 生活 ----
  { kw:['熬夜','几点睡','睡了没','通宵'], r:['搞到4点睡 我算早了','熬夜了害','我一般周末就熬到一点左右'] },
  { kw:['鼻塞','感冒','生病','不舒服'], r:['高三后遗症','鼻塞了','没事 能活'] },
  { kw:['蚊子','叮了','被咬'], r:['我也是','叮了三个包'] },
  { kw:['热','冷','天气','下雨','太阳'], r:['太阳还是蛮毒的','记得带伞了 要下雨','空调开的低'] },
  { kw:['钱','穷','花了','存了'], r:['我全在吃吃喝喝','存了500','手机才2000'] },
  { kw:['喝酒','酒','喝吗','醉'], r:['果粒方调的可以','威士忌酸好喝','少喝点'] },

  // ---- AI / 编程 ----
  { kw:['ai','人工智能','deepseek','模型','gpt'], r:['ai真的好玩 一直在玩ai 想要做啥就说很爽','我接的是DeepSeek','24小时不关'] },
  { kw:['代码','编程','写代码','python','git','爬虫'], r:['我用来写代码的','别急 在弄','先自己琢磨'] },
  { kw:['专利','防沉','发明','项目','实验室'], r:['小型船舶的防沉装置','大一上学期就进了学校实验室','我是弄软件方面的'] },

  // ---- 朋友相关 ----
  { kw:['龙猫','小犟种','臭龙猫','月.'], r:['臭龙猫 小犟种一个','就欺负你','嘿嘿嘿'] },
  { kw:['邓晓旋','晓旋'], r:['她啊 最近聊挺多的','一起看电影来着'] },
  { kw:['小骨头','古雅艺','骨头'], r:['小骨头 25国贸的','帮她砍了一刀 哈哈'] },
  { kw:['好','安琪','陈雨彤','史君毅','霏','%'], r:['我朋友','还行'] },

  // ---- 情感/前任（禁令） ----
  { kw:['前女友','前任','ex','女朋友','恋爱','谈过','分手','感情','喜欢谁','暧昧','送花','吃醋'], r:['不知道 打球吗','害 打游戏去','啥 我去写代码了'] },

  // ---- 欧冠/体育 ----
  { kw:['欧冠','足球赛','进球','点球'], r:['终于进点球了','欧冠好看','看晚了'] },

  // ---- 独生子 ----
  { kw:['兄弟','姐妹','独生','弟弟','妹妹','哥哥','姐姐','爸妈','家里','父母'], r:['我是独生子','爸妈说再生一个 我说要是弟弟我就大四','结果就没生了'] },

  // ---- 表情/情绪 ----
  { kw:['哈哈','笑死','好笑','搞笑','笑'], r:['笑飞了','666','嘿嘿嘿'] },
  { kw:['无聊','没意思','烦','郁闷'], r:['害','服了','正常的'] },
  { kw:['厉害','牛','强','666','无敌'], r:['666','无敌了','确实'] },
  { kw:['加油','冲','干巴爹','努力'], r:['嗯呢','干就完了','OKK'] },
  { kw:['哭了','伤心','emo','难受','崩溃'], r:['不哭不哭','奔溃','害'] },
  { kw:['对不起','抱歉','不好意思','我错了','我的'], r:['没事','好叭好叭我问题','行叭'] },

  // ---- 通用短回复 ----
  { kw:['好','行','可以','没问题','ok'], r:['OKK','嗯呢','行叭'] },
  { kw:['谢谢','多谢','感谢'], r:['害 不用','小事'] },
  { kw:['你是谁','你叫什么','叫什么','名字'], r:['陈伟泽 广航大一的','我陈伟泽啊 咋了'] },
  { kw:['你多大','多大','几岁','年纪'], r:['大一 你说多大','刚成年'] },
  { kw:['在哪','哪里人','哪的'], r:['广州航海学院','黄埔'] },
];

let lastTopic = ''; // memory for context

function getReply(msg) {
  const m = msg.toLowerCase().trim();

  // Exact match first
  for (const rule of RULES) {
    for (const kw of rule.kw) {
      if (m.includes(kw)) {
        lastTopic = kw;
        return pick(rule.r);
      }
    }
  }

  // If message is long (>30 chars), 陈伟泽 gives short reply
  if (msg.length > 30) {
    return pick(['害','说这么多 服了','哦哦','嗯呢','知道了']);
  }

  // If message is '?' or very short
  if (m === '?' || m === '？') return pick(['？','咋了','嗯？']);
  if (m.length <= 1) return pick(['咋了','嗯','？']);

  // Fallback - generic short replies
  const generics = ['害','哦哦','666','蛙趣','咋了','嗯呢','对对对','假的吧','OKK','无敌了','嘿嘿','服了','真的假的','芜湖'];
  return pick(generics);
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============ UI ============
const msgsDiv = document.getElementById('messages');
const typingDiv = document.getElementById('typing');
const input = document.getElementById('msgInput');

const now = new Date();
document.getElementById('dateLabel').textContent = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

function addBubble(text, isMe) {
  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'he'}`;
  const ava = document.createElement('div'); ava.className = 'avatar-small';
  ava.textContent = isMe ? '我' : '泽';
  const wrap = document.createElement('div'); wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble); row.appendChild(ava); row.appendChild(wrap);
  msgsDiv.appendChild(row);
  msgsDiv.scrollTop = msgsDiv.scrollHeight;
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  addBubble(text, true);
  input.value = '';
  typingDiv.classList.add('active');
  msgsDiv.scrollTop = msgsDiv.scrollHeight;

  const reply = getReply(text);
  const delay = reply.length > 10 ? 800 : 350;
  await new Promise(r => setTimeout(r, delay));

  typingDiv.classList.remove('active');
  addBubble(reply, false);
}

function resetChat() {
  lastTopic = '';
  const n = new Date();
  const ds = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  msgsDiv.innerHTML = `<div class="time-divider"><span>${ds}</span></div>`;
}

input.focus();
</script>
</body>
</html>
